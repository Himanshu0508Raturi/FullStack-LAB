<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: blue;
            transition: all 2s ease; 
        }
        .box1:hover {
            background-color: rgb(215, 177, 177);
             rotate: 360deg;
        }
        .box2 { 
            width: 200px;
            height: 200px;
            background-color: rgb(61, 61, 63);
            transition: all 2s ease; 
        }
        .box2:hover {
            background-color: rgb(7, 188, 62);
            width: 300px;
            height: 300px; 
        }
        .box3{
            height: 200px;
            width: 200px;
            background-color: rgb(223, 10, 10);
        }
        .box3:hover{
            background-color: rgb(7, 188, 62);
            border-radius: 300px;
        }
    </style>
</head>

<body>
    <div>
    <h3>Box1- color + Rotate(360<sup>°</sup>)</h3>
    <p class="box1"></p>
    </div>
    <div>
    <h3>Box2- Size Change</h3>
    <p class="box2"></p>
    </div>
    <div>
    <h3>Box3-Circle Effect</h3>
    <p class="box3"></p>
</div>
</body>
</html>
