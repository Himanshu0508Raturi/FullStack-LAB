<!DOCTYPE html>
<html>
<head>
  <title>CSS Transition Effect</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    #box {
      width: 200px;
      height: 200px;
      background-color: blue;
      margin: auto;

      /* Transition Effect */
      transition: all 1s ease;
    }

    /* Style changes on hover */
    #box:hover {
      background-color: red;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      transform: rotate(360deg);
      /* transform: translateX(50px); */
      /* transform: scale(1.5); */
    }
  </style>
</head>

<body>

<h2>CSS Transition Effect Demo</h2>

<div id="box"></div>

</body>
</html>
