<!DOCTYPE html>
<html>
<head>
  <title>Background Position and Repeat</title>

  <style>
    body {

      /* Background Image */
      background-image: url("https://picsum.photos/200");

      /* Repeat Horizontally */
      background-repeat: repeat-y;

      /* Position the image */
      background-position: top center;

      font-family: Arial;
      text-align: center;
      margin: 0;
      height: 2000px;
    }

    h1 {
      margin-top: 150px;
      color: darkblue;
    }

    p {
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>Background Repeat Demo</h1>

<p>
  The background image is repeated horizontally.
</p>

</body>
</html>
