<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Enter String:
    <input type="text" id="str"> <br><br>
    <button onclick="checkPalindrome()">Submit</button>
    <div id="res1"></div>
    <div id="res2"></div>

    <script>
        function checkPalindrome(){
            let str = document.getElementById("str").value.trim();
            let res1 = document.getElementById("res1");
            let res2 = document.getElementById("res2");

            let rev = "";
            for(let i = str.length -1 ; i >= 0 ; i--){
                rev += str[i];
            }
            res1.innerHTML = rev;
            if(rev === str){
                res2.innerHTML = "String is pallindrome";
            }else{
                res2.innerHTML = "String is Not pallindrome";
            }
            return;
        }
    </script>
</body>
</html>
