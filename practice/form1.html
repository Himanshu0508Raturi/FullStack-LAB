<!doctype html>
<html lang="en">
    <head>
        <title>Form 1</title>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Basic Info</legend>
                Full name:
                <input type="text" name="fullname" placeholder="Enter Name"> <br><br>

                Birth Date:
                <input type="date" name="dbay" placeholder="Enter Date"> <br><br>
                Gender:
                <input type="radio"> Male
                <input type="radio"> FeMale <br><br>
                Address:
                <input type="text" name="add" placeholder="Enter address"><br><br>
                Phone Number:
                <input type="tel" name="no" placeholder="Number">
            </fieldset>

            <fieldset>
                <legend>Extra Information</legend>
                Interest:
                <input type="checkbox"> Books
                <input type="checkbox"> Movies
                <input type="checkbox"> VideoGames <br><br>
                Favorite Color:
                <input type="color">
            </fieldset>

            <button type="submit">Send Data</button>
            <button type="reset">Reset Form</button>
        </form>
    </body>
</html>
